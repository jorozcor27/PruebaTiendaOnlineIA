<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito - La Ultima Maravilla</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lexend:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <!-- Barra de Navegación Superior -->
    <nav class="navbar">
        <div class="nav-brand" style="padding-left: 0;">
            <a href="index.html" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px;">
                <span class="logo-small"></span> Tienda Online
            </a>
        </div>
        <div class="nav-user">
            <div class="user-info">
                <span id="userNameDisplay" class="user-name">Invitado</span>
            </div>
            <button class="btn btn-primary btn-sm" onclick="window.location.href='index.html'">Volver a la Tienda</button>
        </div>
    </nav>

    <div class="container fade-in" style="margin-top: 40px;">
        <div class="card-header">
            <h2>Resumen de tu Carrito</h2>
            <p class="text-muted">Gestiona tus productos antes de finalizar la compra.</p>
        </div>

        <div class="cart-container" style="display: grid; grid-template-columns: 1fr 350px; gap: 32px; margin-top: 32px;">
            <!-- Lista de Productos -->
            <div id="cartItemsList" class="cart-items-list">
                <!-- Se cargará dinámicamente -->
                <p>Cargando productos del carrito...</p>
            </div>

            <!-- Resumen de Pago -->
            <div class="cart-summary-card" style="background: var(--white); border: 1px solid var(--outline-variant); padding: 32px; height: fit-content;">
                <h3 style="font-size: 18px; margin-bottom: 24px; border-bottom: 1px solid var(--outline-variant); padding-bottom: 16px;">Total de la Orden</h3>
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <span>Subtotal</span>
                    <span id="cartSubtotal">$0</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                    <span>Envío</span>
                    <span style="color: var(--tertiary); font-weight: 700;">GRATIS</span>
                </div>
                <div style="display: flex; justify-content: space-between; margin-top: 24px; padding-top: 24px; border-top: 2px solid var(--primary); font-weight: 800; font-size: 20px;">
                    <span>TOTAL</span>
                    <span id="cartTotal" style="color: var(--primary);">$0</span>
                </div>
                <button class="btn btn-primary" style="margin-top: 32px; width: 100%;" onclick="finalizarCompra()">Procesar Pago</button>
                <button class="btn btn-secondary" style="margin-top: 12px; width: 100%;" onclick="vaciarCarrito()">Vaciar Carrito</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/app.js"></script>
    <script src="js/carrito.js"></script>
</body>

</html>
